feature: Выполнение лотов
code: lot-execution-unit
description: >
  Уточнения к lot-execution.spec.yaml. Чистый rules engine из
  @dm/shared (packages/shared/src/rules.ts) — отвечает за решение
  «можно ли выполнить лот сейчас по правилам и истории».

  HTTP сценарии выполнения, нарушения правил на границе и атомарность —
  в specs/lot-execution.spec.yaml.

specs-unit:

  # checkRules применяет одно правило к истории и текущему моменту.
  # Границы дня/недели считаются по UTC (см. бизнес-доку, MVP).
  Rule checks:
    - assert: DailyLimit{count=1} пропускает первое выполнение в день (UTC)
    - assert: DailyLimit{count=1} отклоняет второе выполнение в тот же день
    - assert: DailyLimit{count=N} пропускает первые N выполнений
    - assert: WeeklyLimit считается по календарной неделе (понедельник—воскресенье UTC)
    - assert: Cooldown отклоняет выполнение раньше указанного интервала после последнего
    - assert: OneTime отклоняет любое выполнение после первого

  # Несколько правил применяются в AND. При отказе возвращается
  # причина первого сработавшего — UI показывает её человеку.
  Rule composition:
    - assert: все правила лота применяются в AND-логике (любое нарушение блокирует)
    - assert: при нарушении возвращается описание первого сработавшего правила
