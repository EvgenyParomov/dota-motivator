feature: Выполнение лотов
code: lot-execution
description: >
  Отметка пользователем «я сделал это действие» → проверка правил лота
  → запись LotExecution → начисление каток через BalanceMutator.

  Контроля «правда ли сделал» нет — на совести пользователя (см. бизнес-доку).
  Правила (лимиты, кулдаун, разовость) применяются к истории выполнений
  и могут отклонить запрос.

  MVP: границы дня/недели считаются по UTC. Допущение для упрощения;
  для пользователей в восточных часовых поясах граница «дня» может ехать.
  Если станет проблемой — добавим TZ-настройку в profile и пересчитаем.

  Доменная композиция правил и формирование причин отказа —
  в lot-execution.unit.spec.yaml.

specs-e2e:

  # POST /lots/:id/execute проверяет правила, создаёт LotExecution,
  # кредитует баланс через BalanceMutator. Ответ включает обновлённый
  # баланс и созданное событие — чтобы UI не делал второй запрос.
  Успешное выполнение:
    - assert: POST /lots/:id/execute создаёт LotExecution и увеличивает баланс на reward
    - assert: ответ содержит обновлённый баланс и созданное событие
    - assert: balance_events.cause_id ссылается на lot_executions.id

  # Правила применяются по AND-логике. Отказ возвращает 422 с
  # человекочитаемой причиной — UI показывает её в notification.
  Нарушения правил:
    - assert: POST /lots/:id/execute при превышении DailyLimit возвращает 422 с причиной
    - assert: POST /lots/:id/execute во время Cooldown возвращает 422
    - assert: POST /lots/:id/execute на OneTime после первого выполнения возвращает 422
    - assert: после отказа из-за правила не создаётся ни LotExecution, ни balance_event

  # Чужие лоты возвращают 404 (не RuleViolation и не 403), чтобы не
  # раскрывать существование чужих id. Архивированный лот — 410.
  Ошибки доступа:
    - assert: POST /lots/:id/execute на чужой лот возвращает 404
    - assert: POST /lots/:id/execute на архивный лот возвращает 410
    - assert: POST /lots/:id/execute без авторизации возвращает 401

  # GET /lot-executions возвращает все выполнения текущего пользователя.
  # Опциональный фильтр lotId. Изоляция по userId — чужие не утекают.
  История:
    - assert: GET /lot-executions?lotId=:id возвращает выполнения этого лота
    - assert: GET /lot-executions возвращает все выполнения текущего пользователя
    - assert: события чужих пользователей не возвращаются
