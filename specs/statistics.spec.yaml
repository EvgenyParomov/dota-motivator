feature: Статистика
code: statistics
description: >
  Агрегированные представления по событиям баланса (lot-executions + matches).
  Шесть представлений на UI:
  1. Колесо баланса — радар по сферам.
  2. Стена иконок — выполненные лоты, сгруппированные по сферам, за период.
  3. Лента баланса — линия каток во времени с зарубками событий.
  4. Топ-лоты — самые частые активности.
  5. Тепловая карта — по дням года, интенсивность = активность.
  6. Сферы-сироты — без активности N+ дней.

  Серверная сторона: один эндпоинт GET /statistics?period=..., возвращающий
  все агрегаты пачкой (одно обращение к API на загрузку экрана). Frontend
  раскладывает их в разные представления.

  Парсинг period и доменная функция rangeForPeriod — в statistics.unit.spec.yaml.

specs-e2e:

  # GET /statistics?period=<week|month|all> возвращает все 5 секций пачкой:
  # spheres (счётчики по 8 сферам), topLots, events (для ленты),
  # heatmap, orphans. Параметр orphanDays задаёт порог «сирости» сферы.
  Чтение агрегатов:
    - assert: GET /statistics?period=week возвращает все 5 секций (spheres, topLots, events, heatmap, orphans)
    - assert: GET /statistics?period=month возвращает данные с теми же полями
    - assert: GET /statistics с невалидным period возвращает 400
    - assert: GET /statistics без авторизации возвращает 401
    - assert: данные чужих пользователей не утекают
