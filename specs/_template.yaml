# ─────────────────────────────────────────────────────────────────────────────
# Шаблон spec-файла для spec-driven development (specward)
#
# Как пользоваться:
#   1. Скопируй файл рядом с фичей:  specs/<feature>.spec.yaml
#   2. Заполни корневые поля (feature / code / description).
#   3. Под каждой секцией specs-* перечисли категории (= describe в тестах)
#      и assert'ы (= it в тестах).
#   4. Рядом создаётся тест:  src/<feature>/<feature>.spec.ts,
#      describe-структура которого 1-в-1 повторяет YAML.
#
# Соответствие YAML → тесты:
#   specs-unit:
#     Регистрация модуля:        →  describe('Регистрация модуля', () => {
#       - assert: forRoot ...    →    it('forRoot ...', () => { ... });
#                                →  });
#
# Правила, на которые опирается specward:
#   • category-имя должно совпадать с текстом самого внутреннего describe;
#   • assert-текст должен совпадать с текстом it(...);
#   • spec без теста → ERROR (exit 1), тест без spec → WARNING.
# ─────────────────────────────────────────────────────────────────────────────

feature: <Человеко-читаемое имя фичи>
code: <kebab-case-id>           # используется как идентификатор модуля
description: >
  Короткое описание: что делает модуль, какую проблему решает,
  где проходят его границы (что в зоне ответственности, что нет).

# У записи assert'а может быть дополнительное поле `description`:
#   - assert: короткий заголовок, 1-в-1 совпадает с it(...)
#     description: |
#       Развёрнутое описание: контекст, граничные случаи, мотивация,
#       договорённости, ссылки. specward игнорирует это поле при валидации
#       — оно нужно людям и для генерации/обсуждения реализации.

# ─── Юнит-спеки ──────────────────────────────────────────────────────────────
# Изолированная логика: чистые функции, редьюсеры, классы, хуки без UI/IO.
# Категории группируют связанные assert'ы вокруг одного аспекта поведения.
specs-unit:

  <Категория 1 — на чём фокус>:
    - assert: <конкретное проверяемое утверждение в настоящем времени>
      description: |
        Что именно проверяем, при каких входных данных, какой ожидаемый
        результат. Сюда же — нюансы, edge-кейсы, ссылки на тикеты/решения.
    - assert: <ещё одно утверждение>
      description: <короткое уточнение в одну строку — тоже ок>

  <Категория 2>:
    - assert: <утверждение>
      description: |
        ...

# ─── E2E-спеки ───────────────────────────────────────────────────────────────
# Сценарии end-to-end: «пользователь делает X — видит Y».
# Категория здесь — пользовательский сценарий целиком.
specs-e2e:

  <Сценарий 1 — глаголом, от лица пользователя>:
    - assert: <шаг/наблюдаемый результат>
      description: |
        Предусловия, действия пользователя, что должно произойти в UI/системе.
    - assert: <следующий шаг/результат>
      description: |
        ...

# ─── (опц.) Другие срезы ─────────────────────────────────────────────────────
# specward поддерживает любые ключи вида specs-*, например:
#   specs-integration:   # интеграция нескольких модулей без UI
#   specs-contract:      # контракты с внешним API
# Заводим только те срезы, которые реально пишем как тесты.
