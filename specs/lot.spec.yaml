feature: Лоты
code: lot
description: >
  CRUD действий («лотов»), за которые пользователь начисляет себе катки.
  Лот хранит: имя, награду (число, может быть дробным), сферу, правила,
  опциональную иконку (ссылка на media). Архивируется (isActive=false),
  не удаляется физически — история выполнений (lot-execution) должна
  оставаться корректной.

  Правила хранятся как JSON-массив. Типы: DailyLimit{count}, WeeklyLimit{count},
  Cooldown{minutes}, OneTime. Применение правил — в lot-execution.spec.

  Валидация полей и правил, а также сериализация iconUrl через
  MediaUrlResolver — в lot.unit.spec.yaml.

specs-e2e:

  # Авторизованный пользователь создаёт лот через POST /lots. Создание
  # привязывает лот к userId из auth-контекста — userId в теле игнорируется.
  # Валидация полей идёт из домена (reward, имя, правила).
  Создание:
    - assert: POST /lots с валидными данными создаёт лот и возвращает его
    - assert: POST /lots с невалидным reward возвращает 400
    - assert: POST /lots с пустым именем возвращает 400
    - assert: POST /lots без авторизации возвращает 401
    - assert: лот создаётся с userId из auth-контекста (значение userId в теле игнорируется)

  # PATCH /lots/:id обновляет name, reward, sphere, rules, iconMediaKey.
  # Чужие лоты возвращают 404 (не 403), чтобы не раскрывать существование
  # чужих id перебором.
  Обновление:
    - assert: PATCH /lots/:id с валидными данными обновляет лот
    - assert: PATCH /lots/:id чужого пользователя возвращает 404
    - assert: PATCH /lots/:id с пустым именем возвращает 400

  # POST /lots/:id/archive ставит is_active=false без физического удаления —
  # история выполнений должна оставаться валидной. Повторная архивация
  # идемпотентна. Чужие лоты — 404.
  Архивация:
    - assert: POST /lots/:id/archive помечает is_active=false в БД
    - assert: повторная архивация того же лота — успешный ответ без ошибки
    - assert: POST /lots/:id/archive чужого пользователя возвращает 404

  # GET /lots возвращает только активные лоты текущего пользователя.
  # Для каждого лота добавляется computed-поле canExecuteNow по правилам
  # и истории выполнений и iconUrl, разрешённый через MediaUrlResolver.
  Чтение:
    - assert: GET /lots возвращает только активные лоты текущего пользователя
    - assert: GET /lots/:id возвращает детали лота
    - assert: GET /lots/:id чужого пользователя возвращает 404
    - assert: GET /lots с архивированным лотом не включает его в список
    - assert: GET /lots после выполнения DailyLimit-лота возвращает canExecuteNow.allowed=false
