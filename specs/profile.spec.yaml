feature: Профиль пользователя
code: profile
description: >
  Пользовательские настройки: порог долга, флаг завершённого онбординга.
  Реализует порт ProfileInitializer из auth (создание профиля при первом
  входе через Steam). Persona name, avatar и steamId хранятся в user
  (auth-фича) и обновляются на каждый sign-in — здесь не дублируем.

  Балансом владеет отдельная фича balance (см. balance.spec). Профиль
  хранит порог долга, по которому балансовая логика принимает решения
  о блокировке (через порт ProfileReader).

  Доменная валидация порога долга и стартового баланса — в profile.unit.spec.yaml.

specs-e2e:

  # GET /profile возвращает текущие настройки пользователя — то, что
  # нужно UI для отрисовки экрана профиля и онбординга.
  Чтение профиля:
    - assert: GET /profile возвращает текущий debtThreshold и onboardingCompleted
    - assert: GET /profile без авторизации возвращает 401

  # PATCH /profile принимает только debtThreshold. Валидация (целое,
  # неотрицательное) приходит из домена и отрабатывает на границе HTTP.
  Обновление порога долга:
    - assert: PATCH /profile с валидным debtThreshold сохраняет значение и читается через GET /profile
    - assert: PATCH /profile с отрицательным debtThreshold возвращает 400
    - assert: PATCH /profile без авторизации возвращает 401

  # Одна атомарная операция: проставить debt threshold + начальный
  # баланс + флаг онбординга. Повторный вызов отклоняется — стартовый
  # баланс не сбрасываем.
  Завершение онбординга:
    - assert: POST /profile/complete-onboarding со стартовым балансом проставляет флаг и стартовый баланс
    - assert: повторный POST /profile/complete-onboarding возвращает 409
